name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-space-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID || secrets.HF_SPACE_ID || 'DanielleNguyen/Qwen2API-A' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5

      - name: Validate Hugging Face configuration
        run: |
          if [ -z "$HF_SPACE_ID" ]; then
            echo "Missing GitHub variable: HF_SPACE_ID"
            exit 1
          fi

          if [ -z "$HF_TOKEN" ]; then
            echo "Missing GitHub secret: HF_TOKEN"
            exit 1
          fi

      - name: Clone Hugging Face Space
        run: |
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" hf-space

      - name: Sync files to Hugging Face Space
        run: |
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude 'logs/' \
            --exclude 'caches/' \
            ./ hf-space/

      - name: Commit and push changes
        working-directory: hf-space
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync from GitHub ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin main
